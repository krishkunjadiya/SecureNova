name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SecureNova. Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
      placeholder: A clear and concise summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version(s)
      placeholder: 8.0.x and/or 6.0.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact sensitive data before posting.
